<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sky Hopper — One-Tap Arcade Jumper</title>
<meta name="description" content="Sky Hopper: a one-touch endless jumper for Android. Hop between platforms, dodge lasers, unlock 65 cosmetics. Free, offline, no paywalls.">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#F1F5F9;
       background:linear-gradient(180deg,#1B2A4A 0%,#101A33 60%,#0A1226 100%);
       min-height:100vh;display:flex;flex-direction:column;align-items:center;
       justify-content:center;text-align:center;padding:40px 20px}
  .cube{width:96px;height:96px;background:#F8FAFC;border-radius:24px;position:relative;
        margin:0 auto 28px;box-shadow:0 20px 50px rgba(0,0,0,.45);animation:hop 1.3s ease-in-out infinite}
  .cube::before,.cube::after{content:"";position:absolute;top:34px;width:16px;height:16px;
        background:#0F172A;border-radius:50%}
  .cube::before{left:22px}.cube::after{right:22px}
  @keyframes hop{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-18px) scale(1.02,.98)}60%{transform:translateY(0) scale(1.04,.96)}}
  h1{font-size:clamp(36px,8vw,64px);letter-spacing:1px}
  h1 span{color:#FDE047}
  .tag{color:#9DB2D0;font-size:clamp(16px,3vw,22px);margin:12px 0 32px}
  .badge{display:inline-block;background:#38BDF8;color:#0A1226;font-weight:700;
         padding:14px 28px;border-radius:18px;font-size:18px}
  footer{margin-top:48px;color:#64748B;font-size:14px}
  footer a{color:#38BDF8;text-decoration:none}
</style>
</head>
<body>
  <div>
    <div class="cube"></div>
    <h1>SKY <span>HOPPER</span></h1>
    <p class="tag">Hop. Dodge. Climb. — a one-tap endless jumper for Android</p>
    <span class="badge">Coming soon to Google Play</span>
    <footer>
      <a href="privacy-policy.html">Privacy Policy</a>
      &nbsp;·&nbsp; © 2026 Nautilus
    </footer>
  </div>
</body>
</html>
